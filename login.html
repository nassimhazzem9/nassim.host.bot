<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>تسجيل الدخول - NASSIM HOSTING</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700;800&display=swap');
    
    :root {
      --primary: #00ff88;
      --primary-dark: #00cc66;
      --primary-light: #33ff99;
      --accent-glow: #00ff88;
      --gradient: linear-gradient(90deg, #00ff88, #00aa55, #00ff88);
      --bg-dark: #050a05;
      --bg-card: rgba(5, 15, 5, 0.95);
      --text: #ffffff;
      --text-muted: #a0a0a0;
      --border-color: #1a3a1a;
    }
    
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: 'Cairo', sans-serif;
      background: var(--bg-dark);
      color: var(--text);
      min-height: 100vh;
      overflow-x: hidden;
      position: relative;
    }
    
    .background-animation {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: -1;
      overflow: hidden;
    }
    
    .fast-line {
      position: absolute;
      background: linear-gradient(90deg, transparent, var(--primary), transparent);
      height: 2px;
      filter: blur(0.5px);
      opacity: 0.4;
      animation: fastLineMove 8s linear infinite;
      box-shadow: 0 0 20px var(--primary);
    }
    
    .gold-line {
      position: absolute;
      background: linear-gradient(90deg, transparent, var(--primary), transparent);
      height: 3px;
      filter: blur(0px);
      opacity: 0.6;
      animation: goldLineMove 10s linear infinite;
      box-shadow: 0 0 30px var(--primary);
    }
    
    @keyframes fastLineMove {
      0% { transform: translateX(-100vw) rotate(0deg); }
      100% { transform: translateX(100vw) rotate(360deg); }
    }
    
    @keyframes goldLineMove {
      0% { transform: translateX(-120vw) rotate(30deg); }
      100% { transform: translateX(120vw) rotate(390deg); }
    }
    
    @keyframes pulse {
      0%, 100% { transform: scale(1); opacity: 1; }
      50% { transform: scale(1.02); opacity: 0.95; }
    }
    
    @keyframes slideIn {
      from { opacity: 0; transform: translateY(30px); }
      to { opacity: 1; transform: translateY(0); }
    }
    
    @keyframes glowPulse {
      0%, 100% { box-shadow: 0 0 20px rgba(0, 255, 136, 0.3); }
      50% { box-shadow: 0 0 40px rgba(0, 255, 136, 0.6); }
    }
    
    .login-container {
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 20px;
      animation: slideIn 0.8s ease-out;
    }
    
    .logo-section {
      text-align: center;
      margin-bottom: 40px;
      position: relative;
    }
    
    .logo {
      font-size: 3.2rem;
      font-weight: 900;
      background: var(--gradient);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      margin-bottom: 10px;
      animation: pulse 3s infinite;
      text-shadow: 0 0 50px rgba(0, 255, 136, 0.5);
      letter-spacing: 3px;
      text-transform: uppercase;
    }
    
    .logo span {
      color: var(--primary);
      text-shadow: 0 0 30px var(--primary);
    }
    
    .tagline {
      color: var(--text-muted);
      font-size: 1rem;
      margin-top: 10px;
      font-weight: 400;
      letter-spacing: 1px;
    }
    
    .card {
      background: var(--bg-card);
      backdrop-filter: blur(15px);
      border-radius: 24px;
      padding: 40px;
      width: 100%;
      max-width: 460px;
      border: 1px solid rgba(0, 255, 136, 0.2);
      box-shadow: 0 25px 50px rgba(0, 0, 0, 0.6);
      position: relative;
      overflow: hidden;
    }
    
    .card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 3px;
      background: var(--gradient);
    }
    
    .form-title {
      text-align: center;
      font-size: 1.6rem;
      margin-bottom: 30px;
      color: var(--text);
      font-weight: 700;
      position: relative;
      display: inline-block;
      width: 100%;
      text-transform: uppercase;
      letter-spacing: 1px;
    }
    
    .form-title::after {
      content: '';
      position: absolute;
      bottom: -10px;
      left: 50%;
      transform: translateX(-50%);
      width: 60px;
      height: 3px;
      background: var(--gradient);
      border-radius: 2px;
      box-shadow: 0 0 20px var(--primary);
    }
    
    .form-group {
      margin-bottom: 25px;
      position: relative;
    }
    
    .form-group label {
      display: block;
      margin-bottom: 10px;
      color: var(--text-muted);
      font-size: 1rem;
      font-weight: 600;
      transition: all 0.3s;
      letter-spacing: 0.5px;
    }
    
    .input-wrapper {
      position: relative;
    }
    
    .input-icon {
      position: absolute;
      right: 16px;
      top: 50%;
      transform: translateY(-50%);
      font-size: 1.2rem;
      color: var(--primary);
      opacity: 0.7;
    }
    
    .form-group input {
      width: 100%;
      padding: 16px 50px 16px 20px;
      background: rgba(0, 20, 0, 0.6);
      border: 2px solid var(--border-color);
      border-radius: 14px;
      color: var(--text);
      font-size: 1.2rem;
      font-family: 'Cairo', sans-serif;
      transition: all 0.3s;
      font-weight: 500;
      text-align: center;
      letter-spacing: 3px;
    }
    
    .form-group input:focus {
      outline: none;
      border-color: var(--primary);
      background: rgba(0, 255, 136, 0.05);
      box-shadow: 0 0 30px rgba(0, 255, 136, 0.3);
      animation: glowPulse 2s infinite;
    }
    
    .form-group input:hover {
      border-color: rgba(0, 255, 136, 0.5);
    }
    
    .form-group input::placeholder {
      color: var(--text-muted);
      letter-spacing: normal;
      font-size: 1rem;
    }
    
    .btn-login {
      width: 100%;
      padding: 18px;
      background: var(--gradient);
      border: none;
      border-radius: 14px;
      color: #000;
      font-size: 1.2rem;
      font-weight: 800;
      cursor: pointer;
      transition: all 0.3s;
      margin-top: 15px;
      font-family: 'Cairo', sans-serif;
      position: relative;
      overflow: hidden;
      letter-spacing: 1px;
      text-transform: uppercase;
    }
    
    .btn-login:hover {
      transform: translateY(-3px);
      box-shadow: 0 15px 40px rgba(0, 255, 136, 0.4);
    }
    
    .btn-login::before {
      content: '';
      position: absolute;
      top: 0;
      left: -100%;
      width: 100%;
      height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.2), transparent);
      transition: 0.5s;
    }
    
    .btn-login:hover::before {
      left: 100%;
    }
    
    .btn-login:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }
    
    .message {
      padding: 14px;
      margin-top: 20px;
      border-radius: 12px;
      text-align: center;
      font-size: 1rem;
      animation: slideIn 0.5s;
      display: none;
      font-weight: 600;
    }
    
    .success {
      background: rgba(0, 255, 136, 0.1);
      border: 1px solid var(--primary);
      color: var(--primary);
    }
    
    .error {
      background: rgba(255, 68, 68, 0.1);
      border: 1px solid #ff4444;
      color: #ff4444;
    }
    
    .info {
      background: rgba(0, 170, 255, 0.1);
      border: 1px solid #00aaff;
      color: #00aaff;
    }
    
    .login-footer {
      margin-top: 30px;
      text-align: center;
      color: var(--text-muted);
      font-size: 0.9rem;
    }
    
    .login-footer a {
      color: var(--primary);
      text-decoration: none;
      font-weight: 600;
      transition: all 0.3s;
    }
    
    .login-footer a:hover {
      text-shadow: 0 0 10px var(--primary);
    }
    
    .stats-mini {
      display: flex;
      justify-content: space-around;
      margin-top: 25px;
      padding-top: 20px;
      border-top: 1px solid var(--border-color);
    }
    
    .stat-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 5px;
    }
    
    .stat-item .stat-value {
      font-size: 1.3rem;
      color: var(--primary);
    }
    
    .stat-item .stat-label {
      font-size: 0.75rem;
      color: var(--text-muted);
    }
    
    .loading {
      display: none;
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 40px;
      height: 40px;
      border: 3px solid rgba(0, 255, 136, 0.2);
      border-top: 3px solid var(--primary);
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }
    
    @keyframes spin {
      0% { transform: translate(-50%, -50%) rotate(0deg); }
      100% { transform: translate(-50%, -50%) rotate(360deg); }
    }
    
    @media (max-width: 768px) {
      .card { padding: 30px 20px; }
      .logo { font-size: 2.5rem; }
      .tagline { font-size: 0.9rem; }
      .form-title { font-size: 1.4rem; }
    }
  </style>
</head>
<body>
  <div class="background-animation" id="backgroundAnimation"></div>
  
  <div class="login-container">
    <div class="card">
      <div class="logo-section">
        <div class="logo">⚡ NASSIM <span>HOST</span></div>
        <div class="tagline">استضافة بوتات تليجرام المتطورة</div>
      </div>
      
      <div id="loginForm">
        <h2 class="form-title">🔐 أدخل كود التفعيل</h2>
        
        <div class="form-group">
          <label for="activation_code">🎫 كود التفعيل</label>
          <div class="input-wrapper">
            <span class="input-icon">🎫</span>
            <input 
              type="text" 
              id="activation_code" 
              placeholder="أدخل الكود المكون من 10 أحرف" 
              maxlength="10" 
              autocomplete="off"
              autofocus
            >
          </div>
        </div>
        
        <button class="btn-login" onclick="login()" id="loginBtn">
          <span id="loginText">🚀 دخول إلى لوحة التحكم</span>
          <div class="loading" id="loginLoading"></div>
        </button>
        
        <div id="message" class="message"></div>
        
        <div class="login-footer">
          <p>للحصول على كود التفعيل، تواصل مع المشرف</p>
          <a href="https://t.me/NASSIM" target="_blank">@NASSIM</a>
        </div>
        
        <div class="stats-mini">
          <div class="stat-item"><span class="stat-value">🚀</span><span class="stat-label">سريع</span></div>
          <div class="stat-item"><span class="stat-value">🔒</span><span class="stat-label">آمن</span></div>
          <div class="stat-item"><span class="stat-value">24/7</span><span class="stat-label">مستمر</span></div>
          <div class="stat-item"><span class="stat-value">⚡</span><span class="stat-label">مستقر</span></div>
        </div>
      </div>
    </div>
  </div>

  <script>
    function createAnimatedBackground() {
      const container = document.getElementById('backgroundAnimation');
      container.innerHTML = '';
      
      for (let i = 0; i < 12; i++) {
        const line = document.createElement('div');
        line.className = 'fast-line';
        line.style.top = `${Math.random() * 100}%`;
        line.style.left = `${Math.random() * 100}%`;
        line.style.width = `${250 + Math.random() * 350}px`;
        line.style.animationDelay = `${Math.random() * 3}s`;
        line.style.animationDuration = `${7 + Math.random() * 5}s`;
        line.style.opacity = `${0.3 + Math.random() * 0.4}`;
        container.appendChild(line);
      }
      
      for (let i = 0; i < 5; i++) {
        const line = document.createElement('div');
        line.className = 'gold-line';
        line.style.top = `${Math.random() * 100}%`;
        line.style.left = `${Math.random() * 100}%`;
        line.style.width = `${200 + Math.random() * 300}px`;
        line.style.animationDelay = `${Math.random() * 4}s`;
        line.style.animationDuration = `${9 + Math.random() * 4}s`;
        line.style.opacity = `${0.5 + Math.random() * 0.3}`;
        container.appendChild(line);
      }
    }
    
    function showMessage(text, type) {
      const msgDiv = document.getElementById('message');
      msgDiv.textContent = text;
      msgDiv.className = `message ${type}`;
      msgDiv.style.display = 'block';
      setTimeout(() => { msgDiv.style.display = 'none'; }, 5000);
    }
    
    function resetLoginButton() {
      const text = document.getElementById('loginText');
      const loading = document.getElementById('loginLoading');
      const btn = document.getElementById('loginBtn');
      text.style.display = 'inline';
      loading.style.display = 'none';
      btn.disabled = false;
    }
    
    async function login() {
      const code = document.getElementById('activation_code').value.trim().toUpperCase();
      
      if (!code) {
        showMessage('❌ يرجى إدخال كود التفعيل', 'error');
        return;
      }
      
      if (code.length !== 10) {
        showMessage('❌ يجب أن يكون الكود 10 أحرف بالضبط', 'error');
        return;
      }
      
      const btn = document.getElementById('loginBtn');
      const text = document.getElementById('loginText');
      const loading = document.getElementById('loginLoading');
      
      text.style.display = 'none';
      loading.style.display = 'block';
      btn.disabled = true;
      
      try {
        const response = await fetch('/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
          body: `activation_code=${encodeURIComponent(code)}`
        });
        
        const contentType = response.headers.get('content-type');
        
        if (contentType && contentType.includes('application/json')) {
          const data = await response.json();
          if (data.success) {
            showMessage(data.is_admin ? '✨ تم الدخول كمسؤول، جاري التوجيه...' : '✅ تم تسجيل الدخول بنجاح', 'success');
            setTimeout(() => { window.location.href = data.redirect || '/dashboard'; }, 1000);
          } else {
            showMessage('❌ ' + (data.error || 'كود التفعيل غير صحيح أو منتهي الصلاحية'), 'error');
            resetLoginButton();
          }
        } else {
          window.location.href = '/dashboard';
        }
      } catch (error) {
        console.error('Login error:', error);
        showMessage('⚠️ خطأ في الاتصال بالخادم', 'error');
        resetLoginButton();
      }
    }
    
    document.addEventListener('keypress', function(e) {
      if (e.key === 'Enter') login();
    });
    
    document.getElementById('activation_code').addEventListener('input', function(e) {
      e.target.value = e.target.value.toUpperCase().replace(/[^A-Z0-9]/g, '').slice(0, 10);
    });
    
    async function checkAuth() {
      try {
        const response = await fetch('/api/current_user');
        const data = await response.json();
        if (data.authenticated) window.location.href = '/dashboard';
      } catch (error) {}
    }
    
    document.addEventListener('DOMContentLoaded', function() {
      createAnimatedBackground();
      setTimeout(checkAuth, 500);
    });
  </script>
</body>
</html>
