<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" name="viewport"/>
<title>تسجيل الدخول - NASSIM HOST</title>
<!-- الخطوط -->
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&amp;family=Tajawal:wght@300;400;500;700&amp;family=Rajdhani:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet"/>
<style>
    /* الأساسيات - تم الحفاظ على جميع التنسيقات الأسطورية */
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        -webkit-tap-highlight-color: transparent;
    }
    
    body {
        font-family: 'Tajawal', 'Rajdhani', sans-serif;
        background: linear-gradient(135deg, #0a1f0a 0%, #071a07 100%);
        color: #fff;
        direction: rtl;
        min-height: 100vh;
        overflow-x: hidden;
        -webkit-overflow-scrolling: touch;
        touch-action: manipulation;
    }

    /* شريط التنقل الذكي */
    .navbar {
        background: rgba(10, 20, 15, 0.95);
        border-bottom: 2px solid #0aff64;
        padding: 12px 30px;
        display: flex;
        justify-content: center;
        align-items: center;
        box-shadow: 0 5px 25px rgba(10, 255, 100, 0.15);
        backdrop-filter: blur(15px);
        position: sticky;
        top: 0;
        z-index: 100;
        border-radius: 0 0 15px 15px;
    }
    
    .logo {
        display: flex;
        align-items: center;
        gap: 15px;
    }
    
    .logo-icon {
        width: 45px;
        height: 45px;
        background: linear-gradient(135deg, #0aff64 0%, #00ff88 100%);
        border-radius: 12px;
        display: flex;
        align-items: center;
        justify-content: center;
        box-shadow: 0 0 20px rgba(10, 255, 100, 0.5);
    }
    
    .logo-icon i {
        font-size: 22px;
        color: #fff;
    }
    
    .logo-text {
        font-family: 'Orbitron', sans-serif;
        font-size: 22px;
        font-weight: 900;
        background: linear-gradient(90deg, #0aff64, #00ff88);
        -webkit-background-clip: text;
        background-clip: text;
        color: transparent;
        text-shadow: 0 0 10px rgba(10, 255, 100, 0.3);
    }

    /* الحاوية الرئيسية */
    .login-container {
        width: 92%;
        max-width: 480px;
        margin: 50px auto 30px;
        background: rgba(15, 25, 20, 0.85);
        padding: 30px;
        border-radius: 20px;
        border: 2px solid rgba(74, 111, 255, 0.3);
        box-shadow: 0 10px 30px rgba(10, 255, 100, 0.1);
        backdrop-filter: blur(10px);
        position: relative;
        overflow: hidden;
        transition: all 0.3s ease;
    }
    
    .login-container::before {
        content: '';
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        height: 3px;
        background: linear-gradient(90deg, #4a6fff, #6a5af9);
        border-radius: 20px 20px 0 0;
    }
    
    .login-container:hover {
        transform: translateY(-5px);
        box-shadow: 0 15px 40px rgba(74, 111, 255, 0.2);
    }

    /* عنوان البطاقة */
    .card-header {
        display: flex;
        align-items: center;
        gap: 15px;
        margin-bottom: 25px;
        padding-bottom: 15px;
        border-bottom: 1px solid rgba(10, 255, 100, 0.2);
    }
    
    .card-icon {
        width: 50px;
        height: 50px;
        background: linear-gradient(135deg, #4a6fff 0%, #6a5af9 100%);
        border-radius: 12px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 22px;
        color: #fff;
        box-shadow: 0 5px 15px rgba(74, 111, 255, 0.3);
    }
    
    .card-title {
        font-size: 20px;
        font-weight: 700;
        color: #b0ffd0;
        font-family: 'Orbitron', sans-serif;
    }
    
    .card-subtitle {
        font-size: 14px;
        color: #90ffb0;
        margin-top: 5px;
    }

    /* حقول الإدخال */
    .input-group {
        margin-bottom: 20px;
    }
    
    .input-group label {
        display: block;
        margin-bottom: 10px;
        color: #b0ffd0;
        font-weight: 600;
        font-size: 16px;
        display: flex;
        align-items: center;
        gap: 8px;
    }
    
    .input-wrapper {
        position: relative;
    }
    
    .input-wrapper input {
        width: 100%;
        padding: 16px 20px;
        padding-right: 50px;
        border: 2px solid rgba(74, 111, 255, 0.2);
        border-radius: 12px;
        background: rgba(20, 30, 25, 0.7);
        color: #fff;
        font-size: 16px;
        font-family: 'Tajawal', sans-serif;
        transition: all 0.3s;
        -webkit-appearance: none;
        text-align: center;
        letter-spacing: 2px;
    }
    
    .input-wrapper input:focus {
        border-color: #4a6fff;
        box-shadow: 0 0 0 3px rgba(74, 111, 255, 0.2);
        outline: none;
        background: rgba(20, 30, 25, 0.9);
    }
    
    .input-icon {
        position: absolute;
        left: 20px;
        top: 50%;
        transform: translateY(-50%);
        color: #4a6fff;
        font-size: 18px;
    }

    /* الكابتشا */
    .captcha-group {
        background: rgba(20, 30, 25, 0.7);
        border: 2px solid rgba(74, 111, 255, 0.2);
        border-radius: 12px;
        padding: 20px;
        margin-bottom: 20px;
        text-align: center;
        position: relative;
        overflow: hidden;
    }
    
    .captcha-group::before {
        content: '';
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        height: 2px;
        background: linear-gradient(90deg, #4a6fff, #6a5af9);
    }
    
    .captcha-question {
        font-family: 'Orbitron', sans-serif;
        font-size: 22px;
        color: #4a6fff;
        margin-bottom: 15px;
        text-shadow: 0 0 5px rgba(74, 111, 255, 0.5);
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 10px;
    }
    
    .captcha-question i {
        color: #0aff64;
    }

    /* الأزرار */
    .btn {
        width: 100%;
        padding: 16px;
        border: none;
        border-radius: 12px;
        font-size: 18px;
        font-weight: 700;
        cursor: pointer;
        transition: all 0.3s;
        font-family: 'Tajawal', sans-serif;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 10px;
        position: relative;
        overflow: hidden;
        -webkit-touch-callout: none;
        -webkit-user-select: none;
        user-select: none;
    }
    
    .btn-primary {
        background: linear-gradient(135deg, #4a6fff 0%, #6a5af9 100%);
        color: white;
        box-shadow: 0 5px 15px rgba(74, 111, 255, 0.3);
    }
    
    .btn-primary:hover {
        background: linear-gradient(135deg, #6a5af9 0%, #4a6fff 100%);
        box-shadow: 0 8px 25px rgba(74, 111, 255, 0.4);
        transform: translateY(-2px);
    }
    
    .btn::before {
        content: '';
        position: absolute;
        top: 0;
        left: -100%;
        width: 100%;
        height: 100%;
        background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
        transition: 0.5s;
    }
    
    .btn:hover::before {
        left: 100%;
    }
    
    .btn:disabled {
        opacity: 0.6;
        cursor: not-allowed;
    }

    /* التنبيهات */
    .alert {
        padding: 15px;
        border-radius: 10px;
        margin: 10px 0;
        display: flex;
        align-items: center;
        gap: 10px;
        animation: slideIn 0.3s ease;
        backdrop-filter: blur(5px);
    }
    
    .alert-error {
        background: rgba(255, 65, 108, 0.15);
        border: 1px solid #ff416c;
        color: #ffb5b5;
    }
    
    .alert-success {
        background: rgba(10, 255, 100, 0.15);
        border: 1px solid #0aff64;
        color: #b0ffd0;
    }
    
    @keyframes slideIn {
        from { opacity: 0; transform: translateY(-10px); }
        to { opacity: 1; transform: translateY(0); }
    }

    /* التذييل */
    .footer {
        text-align: center;
        margin-top: 40px;
        padding: 25px;
        color: #90ffb0;
        font-size: 14px;
        border-top: 1px solid rgba(10, 255, 100, 0.2);
        background: rgba(10, 20, 15, 0.8);
        backdrop-filter: blur(5px);
    }

    /* تحسينات للجوال */
    @media (max-width: 768px) {
        .navbar { padding: 15px; }
        .login-container { padding: 25px; margin-top: 40px; width: 95%; }
        .logo-text { font-size: 20px; }
    }
    
    @media (max-width: 480px) {
        .input-wrapper input { padding: 14px 20px; padding-right: 45px; font-size: 15px; }
        .btn { padding: 14px; font-size: 16px; }
        .card-header { flex-direction: column; text-align: center; gap: 10px; }
        .card-icon { width: 45px; height: 45px; font-size: 20px; }
        .captcha-question { font-size: 18px; }
    }

    /* شريط التمرير المخصص */
    ::-webkit-scrollbar { width: 8px; }
    ::-webkit-scrollbar-track { background: rgba(10, 20, 15, 0.5); border-radius: 4px; }
    ::-webkit-scrollbar-thumb { background: linear-gradient(180deg, #0aff64, #00ff88); border-radius: 4px; }
    ::-webkit-scrollbar-thumb:hover { background: linear-gradient(180deg, #00ff88, #0aff64); }
    
    /* تحسينات iOS */
    input, textarea, select { font-size: 16px !important; }
    
    /* تأثير التحميل */
    .loading {
        display: inline-block;
        width: 20px;
        height: 20px;
        border: 3px solid rgba(255, 255, 255, 0.3);
        border-radius: 50%;
        border-top-color: #4a6fff;
        animation: spin 1s ease-in-out infinite;
    }
    
    @keyframes spin { to { transform: rotate(360deg); } }
    
    .message { margin-top: 15px; }
</style>
</head>
<body>
<!-- شريط التنقل الذكي -->
<nav class="navbar">
<div class="logo">
<div class="logo-icon">
<i class="fas fa-code"></i>
</div>
<div>
<div class="logo-text">NASSIM HOST</div>
<div style="font-size: 11px; color: #90ffb0;">استضافة البوتات المتطورة</div>
</div>
</div>
</nav>

<!-- حاوية تسجيل الدخول -->
<div class="login-container">
<div class="card-header">
<div class="card-icon">
<i class="fas fa-shield-alt"></i>
</div>
<div>
<div class="card-title">دخول آمن</div>
<div class="card-subtitle">أدخل كود التفعيل + تحقق من الكابتشا</div>
</div>
</div>

<!-- نموذج تسجيل الدخول بالكود والكابتشا -->
<form id="loginForm" onsubmit="login(); return false;">
<div class="input-group">
<label for="activation_code">
<i class="fas fa-ticket-alt"></i>
            كود التفعيل (10 أحرف)
        </label>
<div class="input-wrapper">
<input autocomplete="off" id="activation_code" name="activation_code" placeholder="أدخل 10 أحرف" maxlength="10" required="" type="text" autofocus/>
<div class="input-icon">
<i class="fas fa-barcode"></i>
</div>
</div>
</div>

<!-- نظام الكابتشا الرياضي -->
<div class="captcha-group">
<div class="captcha-question">
<i class="fas fa-shield-virus"></i>
<span id="captchaQuestion">6 + 5 = ?</span>
</div>
<div class="input-wrapper">
<input id="captcha" name="captcha" placeholder="أدخل الناتج" required="" type="text" inputmode="numeric"/>
<div class="input-icon">
<i class="fas fa-calculator"></i>
</div>
</div>
</div>

<button class="btn btn-primary" id="loginBtn" type="submit">
<i class="fas fa-sign-in-alt"></i>
        تسجيل الدخول
    </button>

<!-- منطقة عرض الرسائل -->
<div id="message" class="message"></div>
</form>
</div>

<!-- التذييل -->
<div class="footer">
<i class="fas fa-cloud-upload-alt" style="margin-left: 8px;"></i>
    NASSIM HOSTING | لوحة تحكم استضافة البوتات
    <br/>
<span style="font-size: 12px; opacity: 0.8;">
    الإصدار 2.0 | تصميم أسطوري + حماية كابتشا
</span>
</div>

<script>
    // ========== إعداد الكابتشا ==========
    let currentCaptchaAnswer = 0;
    
    function generateCaptcha() {
        const num1 = Math.floor(Math.random() * 10) + 1; // 1-10
        const num2 = Math.floor(Math.random() * 10) + 1; // 1-10
        currentCaptchaAnswer = num1 + num2;
        document.getElementById('captchaQuestion').innerHTML = 
            `<i class="fas fa-shield-virus"></i> ${num1} + ${num2} = ?`;
    }
    
    // ========== دوال مساعدة ==========
    function showMessage(text, type) {
        const msgDiv = document.getElementById('message');
        msgDiv.innerHTML = `<div class="alert alert-${type}"><i class="fas fa-${type === 'success' ? 'check-circle' : 'exclamation-circle'}"></i> ${text}</div>`;
    }

    function clearMessage() {
        document.getElementById('message').innerHTML = '';
    }

    function setLoading(isLoading) {
        const btn = document.getElementById('loginBtn');
        const icon = btn.querySelector('i');
        if (isLoading) {
            btn.disabled = true;
            icon.className = 'fas fa-spinner fa-spin';
        } else {
            btn.disabled = false;
            icon.className = 'fas fa-sign-in-alt';
        }
    }

    // تنسيق الكود - أحرف وأرقام فقط
    document.getElementById('activation_code').addEventListener('input', function(e) {
        e.target.value = e.target.value.toUpperCase().replace(/[^A-Z0-9]/g, '').slice(0, 10);
    });

    // ========== تسجيل الدخول ==========
    async function login() {
        const codeInput = document.getElementById('activation_code');
        const captchaInput = document.getElementById('captcha');
        const code = codeInput.value.trim().toUpperCase();
        const captchaValue = captchaInput.value.trim();
        
        // التحقق من الكود
        if (!code) {
            showMessage('يرجى إدخال كود التفعيل', 'error');
            codeInput.focus();
            return;
        }
        
        if (code.length !== 10) {
            showMessage('يجب أن يتكون الكود من 10 أحرف بالضبط', 'error');
            codeInput.focus();
            return;
        }
        
        // التحقق من الكابتشا
        if (!captchaValue) {
            showMessage('يرجى إدخال ناتج الكابتشا', 'error');
            captchaInput.focus();
            return;
        }
        
        if (parseInt(captchaValue) !== currentCaptchaAnswer) {
            showMessage('إجابة الكابتشا غير صحيحة', 'error');
            captchaInput.value = '';
            captchaInput.focus();
            generateCaptcha(); // تجديد السؤال
            return;
        }

        clearMessage();
        setLoading(true);

        try {
            const response = await fetch('/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                body: `activation_code=${encodeURIComponent(code)}`
            });

            const contentType = response.headers.get('content-type');
            if (contentType && contentType.includes('application/json')) {
                const data = await response.json();
                if (data.success) {
                    showMessage(data.is_admin ? '✨ دخول المشرف - جاري التوجيه...' : '✅ تم التحقق، جاري التوجيه...', 'success');
                    setTimeout(() => {
                        window.location.href = data.redirect || (data.is_admin ? '/admin' : '/dashboard');
                    }, 1000);
                } else {
                    showMessage(data.error || 'كود التفعيل غير صحيح أو منتهي الصلاحية', 'error');
                    setLoading(false);
                    generateCaptcha(); // تجديد الكابتشا بعد الخطأ
                }
            } else {
                window.location.href = '/dashboard';
            }
        } catch (error) {
            console.error('Login error:', error);
            showMessage('⚠️ خطأ في الاتصال بالخادم. حاول مجدداً.', 'error');
            setLoading(false);
            generateCaptcha();
        }
    }

    // دعم زر Enter
    document.addEventListener('keypress', function(e) {
        if (e.key === 'Enter') {
            e.preventDefault();
            login();
        }
    });

    // التحقق من حالة تسجيل الدخول الحالية
    async function checkAuth() {
        try {
            const response = await fetch('/api/current_user');
            const data = await response.json();
            if (data.authenticated) {
                window.location.href = data.is_admin ? '/admin' : '/dashboard';
            }
        } catch (error) {
            // لا يوجد جلسة نشطة
        }
    }

    // تهيئة الصفحة
    document.addEventListener('DOMContentLoaded', () => {
        generateCaptcha();
        checkAuth();
        
        // تحسينات iOS
        if (/iPhone|iPad|iPod/.test(navigator.userAgent)) {
            document.querySelectorAll('input').forEach(input => {
                input.addEventListener('focus', function() {
                    setTimeout(() => this.scrollIntoView({ behavior: 'smooth', block: 'center' }), 300);
                });
            });
        }
    });
</script>
</body>
</html>
